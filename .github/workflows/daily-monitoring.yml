name: Daily Monitoring

on:
  schedule:
    # Run once daily at 6 AM UTC (consolidates gsc-monitor, cwv-monitor, daily-marketing-report)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-analytics-data requests pyyaml

      - name: Setup GSC credentials
        run: echo "$GSC_SERVICE_ACCOUNT_JSON" > /tmp/gsc-creds.json
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}

      - name: GSC monitoring
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsc-creds.json
        run: python scripts/gsc_tracker.py --snapshot --report --alert

      - name: CWV monitoring
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: python scripts/cwv_monitor.py --snapshot --report --alert

      - name: Marketing report
        run: |
          mkdir -p reports
          python scripts/daily-marketing-report.py --output "reports/$(date +%Y-%m-%d).md"
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: data/gsc-service-account.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: daily monitoring $(date +%Y-%m-%d)"
          git push
