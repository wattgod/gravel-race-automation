name: Immune Check

# Layer 1 of the immune system: the deterministic verifier. Runs on every push
# and nightly. Fails the build ONLY on a RED finding (dead money path, possible
# secret) so real emergencies are loud; judgment-call YELLOW findings are left for
# the nightly agent's PR, not a blocked push.
#
# Offline only (no --live) — the weekly live-site sweep already lives in
# link-check.yml (Tuesdays). immune_check.py's own imports are stdlib-only, so
# no dependency install is needed here.

on:
  push:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch:

jobs:
  immune:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Immune scan (offline, fail on RED only)
        run: python3 scripts/immune_check.py --fail-on red
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immune-report
          path: immune/report.json
