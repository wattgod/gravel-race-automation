name: Link Check

# Weekly dead-link sweep of the live site (born from the Jul 2026 whoops
# audit: 5 dead nav/footer URLs sat on every page for ~3 months unnoticed).
# A red run = something a visitor can click is broken.
# Exit codes: 1 = dead links (broken for visitors); 2 = inconclusive (the
# scan tripped SiteGround's WAF bot-challenge and could not verify) — both
# are red, but 2 usually just needs a re-run, not a fix.

on:
  schedule:
    - cron: "0 12 * * 2"   # Tuesdays 12:00 UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check live links (gravelgodcycling.com)
        run: |
          set -o pipefail
          python3 scripts/check_links.py --max-urls 300 --delay 0.4 2>&1 | tee /tmp/link-check.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Link Check"
            echo
            echo '```'
            cat /tmp/link-check.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
