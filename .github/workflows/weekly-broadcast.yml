name: "Weekly Gravel TV Broadcast"

# The fully automated weekly ritual — nothing depends on anyone remembering:
#   1. Draft the desk note (Claude, fact-grounded, slop-gated; data-only
#      fallback on any failure). A manual edit committed to
#      web/gravel-tv-desk-note.md after Wednesday simply wins next run.
#   2. Regenerate /gravel-tv/ + homepage (fresh race calendar)
#   3. Deploy both to SiteGround + purge cache
#   4. Commit the desk note for history
#   5. Open a GitHub issue with the note (coach visibility, after-the-fact)
#   6. If SENDGRID_API_KEY is set: send the issue to subscribers (fail-soft)
#
# Runs Wednesday 13:00 UTC — the day after the Tuesday fact-refresh, so
# corrected dates ride into the broadcast.

on:
  schedule:
    - cron: '0 13 * * 3'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic pyyaml requests python-dotenv

      - name: Draft desk note
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/draft_desk_note.py

      - name: Regenerate Gravel TV + homepage
        run: |
          python wordpress/generate_gravel_tv.py
          python wordpress/generate_homepage.py

      - name: Verify GA4 + structure
        run: |
          for f in wordpress/output/gravel-tv.html wordpress/output/homepage.html; do
            grep -q "G-EJJZ9T6M52" "$f" || { echo "::error::GA4 missing in $f"; exit 1; }
          done
          grep -q "gtv-logo" wordpress/output/gravel-tv.html

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # printf '%s\n' — OpenSSH requires a trailing newline; without it
          # key load fails with "error in libcrypto" (broke run 27303536329)
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/siteground_key
          chmod 600 ~/.ssh/siteground_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy + purge cache
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: python scripts/push_wordpress.py --sync-gravel-tv --sync-homepage --purge-cache

      - name: Verify live
        run: |
          # Verify THIS WEEK'S content is live, not just any page — the
          # masthead-only check passed on a stale page after a silent
          # upload failure (run 27303536329). The generator embeds the
          # desk note's md5 as <!-- gtv-note-hash: ... -->.
          HASH=$(python -c "import hashlib,pathlib; print(hashlib.md5(pathlib.Path('web/gravel-tv-desk-note.md').read_text().strip().encode()).hexdigest())")
          echo "Expecting note hash $HASH"
          for i in 1 2 3 4 5; do
            sleep 10
            if curl -s -L "https://gravelgodcycling.com/gravel-tv/?v=$HASH" | grep -q "gtv-note-hash: $HASH"; then
              echo "Fresh content live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: this week's note not live yet"
          done
          echo "::error::Live page does not contain this week's desk note (5 attempts over 50s)"
          exit 1

      - name: Commit desk note
        run: |
          git config user.name "gravel-tv-bot"
          git config user.email "broadcast@gravelgodcycling.com"
          git add web/gravel-tv-desk-note.md
          git diff --cached --quiet || {
            git commit -m "gravel-tv: desk note $(date +%Y-%m-%d)"
            git push
          }

      - name: Open issue with this week's note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Gravel TV broadcast live — $(date +%Y-%m-%d)" \
            --body "$(printf 'This week'"'"'s broadcast deployed to https://gravelgodcycling.com/gravel-tv/\n\nDesk note as published (edit web/gravel-tv-desk-note.md + rerun the workflow to change it):\n\n---\n\n%s' "$(cat web/gravel-tv-desk-note.md)")"

      - name: Send to subscribers (Resend; skips if keys missing)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/send_broadcast_email.py
