name: "Weekly Fact Refresh (gated auto-commit)"

# The race-content freshness loop, facts tier:
#   scrape official sites (stale dates first) → Claude extraction →
#   fact_check --auto-fix (whitelisted fields: dates, status) →
#   verification gates (fabricated-claims audit + date format tests) →
#   auto-commit to main + notification issue. Corrected dates ride into
#   the Wednesday Gravel TV broadcast automatically.
#
# Guardrails:
#   - Whitelisted FACT fields only (dates, cancelled/paused status);
#     editorial content never auto-publishes
#   - Anomaly brake: >10 changed profiles → issue instead of commit
#   - Budget: scraping is free; Claude extraction ~$0.01-0.05/race on the
#     stale subset (≤50/run) — comfortably inside the $25/mo cap

on:
  schedule:
    # Tuesdays 14:00 UTC — fresh data before the weekly Gravel TV issue
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Ignore cache, re-scrape stale races'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pyyaml anthropic beautifulsoup4 pytest

      - name: Scrape + extract (stale dates first)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/scrape_official_sites.py --stale-only \
            ${{ inputs.force_all && '--force' || '' }} || true

      - name: Apply safe fixes
        run: python scripts/fact_check_profiles.py --auto-fix || true

      - name: Count changed profiles
        id: changes
        run: |
          CHANGED=$(git diff --name-only race-data/ | wc -l | tr -d ' ')
          echo "count=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed profiles: $CHANGED"
          git diff --stat race-data/ | tail -5

      - name: Verification gates
        if: steps.changes.outputs.count != '0'
        run: |
          python scripts/audit_fabricated_claims.py --json > /tmp/claims.json 2>/dev/null || true
          UNSUPPORTED=$(python3 -c "import json; d=json.load(open('/tmp/claims.json')); print(sum(1 for f in d if f.get('severity')=='unsupported'))")
          if [ "$UNSUPPORTED" != "0" ]; then
            echo "::error::Claims audit found $UNSUPPORTED unsupported claim(s) after refresh — refusing to commit"
            exit 1
          fi
          python -m pytest tests/test_dates.py -q

      - name: Anomaly brake — too many changes
        if: steps.changes.outputs.count > 10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff --stat race-data/ > /tmp/diffstat.txt
          gh issue create \
            --title "Fact refresh anomaly: ${{ steps.changes.outputs.count }} profiles changed in one run" \
            --body "$(printf 'The weekly fact refresh changed more than 10 profiles, which exceeds the anomaly brake. No PR was opened — review the run logs.\n\n```\n%s\n```' "$(cat /tmp/diffstat.txt)")"
          echo "::warning::Anomaly brake tripped — issue opened, no commit"
          git checkout -- race-data/
          exit 0

      - name: Commit fixes to main (gated auto-merge)
        if: steps.changes.outputs.count != '0' && steps.changes.outputs.count <= 10
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "fact-refresh-bot"
          git config user.email "fact-refresh@gravelgodcycling.com"
          git add race-data/ data/ 2>/dev/null || git add race-data/
          git commit -m "fact-refresh: scraped date/status fixes ($(date +%Y-%m-%d))"
          git push
          gh issue create \
            --title "Fact refresh applied: ${{ steps.changes.outputs.count }} profile fix(es) — $(date +%Y-%m-%d)" \
            --body "$(printf 'Auto-committed to main after gates passed (claims audit 0 unsupported, date-format tests green). Corrected dates ride into tomorrow'"'"'s Gravel TV broadcast automatically; race-page deploy ships them on the next full deploy.\n\n```\n%s\n```' "$(git diff --stat HEAD~1 | tail -8)")"

      - name: No changes
        if: steps.changes.outputs.count == '0'
        run: echo "Nothing stale this week."
