<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Georgia, serif; background: #f5f5f0; margin: 0; padding: 20px; }
    .container { max-width: 580px; margin: 0 auto; background: #ffffff; border: 2px solid #1a1a1a; }
    .header { background: #1a1a1a; padding: 24px 32px; }
    .header h1 { color: #f5f5f0; font-size: 22px; margin: 0; letter-spacing: -0.5px; font-family: 'Courier New', monospace; }
    .body { padding: 32px; color: #1a1a1a; line-height: 1.7; font-size: 16px; }
    .body p { margin: 0 0 16px; }

    .footer { padding: 20px 32px; border-top: 2px solid #1a1a1a; font-family: 'Courier New', monospace; font-size: 11px; color: #777777; }
    a { color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ROADIE LABS</h1>
    </div>
    <div class="body">
      <p>{first_name} — how did the first rides feel?</p>
      <p>If the answer is &ldquo;easy&rdquo;: correct. That is calibration. Do not add volume to it.</p>
      <p>— Matti</p>
    </div>
    <div class="footer">Roadie Labs &middot; <a href="https://roadielabs.com">roadielabs.com</a></div>
  </div>
