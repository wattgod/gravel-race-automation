<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Georgia, serif; background: #f8f3ec; margin: 0; padding: 20px; }
    .container { max-width: 580px; margin: 0 auto; background: #ffffff; border: 2px solid #d4c5b9; }
    .header { background: #3a2e25; padding: 24px 32px; }
    .header h1 { color: #B7950B; font-size: 22px; margin: 0; letter-spacing: -0.5px; }
    .body { padding: 32px; color: #3a2e25; line-height: 1.7; font-size: 16px; }
    .body p { margin: 0 0 16px; }
    .tip { background: #f8f3ec; border-left: 4px solid #B7950B; padding: 12px 16px; margin: 12px 0; }
    .footer { padding: 20px 32px; border-top: 2px solid #d4c5b9; font-family: 'Courier New', monospace; font-size: 11px; color: #8c7568; }
    a { color: #1A8A82; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Gravel God</h1>
    </div>
    <div class="body">
      <p>{first_name} — how did the first rides feel?</p>
      <p>If the answer is &ldquo;too easy&rdquo; — good. That's calibration, not a mistake. Don't add extra. I've made that mistake enough times for both of us.</p>
      <p>— Matti</p>
    </div>
    <div class="footer">Matti Rowe &middot; Gravel God Cycling &middot; <a href="https://gravelgodcycling.com">gravelgodcycling.com</a></div>
  </div>
</body>
</html>
